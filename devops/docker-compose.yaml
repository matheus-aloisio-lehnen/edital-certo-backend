services:
    backend:
        build:
            context: ..
            dockerfile: devops/Dockerfile
            target: debug
        container_name: novo-projeto-backend
        working_dir: /app
        ports:
            - "3000:3000"
            - "9229:9229"
        env_file:
            - ./.env
        volumes:
            - ../:/app
            - /app/node_modules
        depends_on:
            - postgres
            - redis
            - rabbitmq
            - redis-exporter
            - lgtm

    postgres:
        image: postgres:16
        container_name: novo-projeto-postgres
        env_file:
            - ./.env
        environment:
            POSTGRES_USER: ${DEV_DB_USERNAME}
            POSTGRES_PASSWORD: ${DEV_DB_PASSWORD}
            POSTGRES_DB: ${DEV_DB_NAME}
        ports:
            - "5432:5432"
        volumes:
            - ../data/postgres:/var/lib/postgresql/data

    redis:
        image: redis:7
        container_name: novo-projeto-redis
        env_file:
            - ./.env
        command: redis-server --requirepass ${DEV_REDIS_PASS}
        ports:
            - "6379:6379"
        volumes:
            - ../data/redis:/data

    redis-exporter:
        image: oliver006/redis_exporter:v1.79.0
        container_name: novo-projeto-redis-exporter
        env_file:
            - ./.env
        environment:
            REDIS_ADDR: redis://redis:6379
            REDIS_PASSWORD: ${DEV_REDIS_PASS}
        ports:
            - "9121:9121"
        depends_on:
            - redis

    rabbitmq:
        image: rabbitmq:3-management
        container_name: novo-projeto-rabbitmq
        env_file:
            - ./.env
        environment:
            RABBITMQ_DEFAULT_USER: ${DEV_RABBITMQ_USER}
            RABBITMQ_DEFAULT_PASS: ${DEV_RABBITMQ_PASSWORD}
        ports:
            - "5672:5672"
            - "15672:15672"
            - "15692:15692"
        volumes:
            - ../data/rabbitmq:/var/lib/rabbitmq
            - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
            - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro

    lgtm:
        image: grafana/otel-lgtm:latest
        container_name: novo-projeto-lgtm
        ports:
            - "3001:3000"
            - "4317:4317"
            - "4318:4318"
        volumes:
            - ../data/lgtm:/data
